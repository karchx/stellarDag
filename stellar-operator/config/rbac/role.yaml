---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - beam.stellar.dev
  resources:
  - beamclusters
  - beamwebapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - beam.stellar.dev
  resources:
  - beamclusters/finalizers
  - beamwebapps/finalizers
  verbs:
  - update
- apiGroups:
  - beam.stellar.dev
  resources:
  - beamclusters/status
  - beamwebapps/status
  verbs:
  - get
  - patch
  - update
